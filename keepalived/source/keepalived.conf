! Configuration File for keepalived

global_defs {
    router_id Mysql_Source
    vrrp_skip_check_adv_addr
    vrrp_strict
    max_auto_priority
}

vrrp_script check_mysql {
    script "/root/mysql_shell/mysql_check_keepalived.sh"
    interval 2
    weight -20
}

vrrp_instance VI_2 {
    state BACKUP
    interface ens160
    virtual_router_id 50
    priority 100
    nopreempt
    advert_int 1
    virtual_ipaddress {
        10.0.1.50
    }
}
